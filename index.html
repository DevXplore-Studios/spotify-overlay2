<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 40px;
    font-family: 'DM Mono', monospace;
  }

  .widget {
    width: 360px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .widget.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .inner {
    background: rgba(8, 8, 10, 0.82);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 16px;
    display: flex;
    gap: 14px;
    align-items: center;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .art-wrap {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
    border-radius: 10px;
    overflow: hidden;
    background: #111;
  }

  .art-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.4s ease;
  }

  .info { flex: 1; min-width: 0; }

  .label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #1DB954;
    margin-bottom: 5px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #1DB954;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.6); opacity: 0.5; }
  }

  .widget:not(.playing) .dot { animation: none; opacity: 0.3; }
  .widget:not(.playing) .label { color: rgba(255,255,255,0.3); }

  .title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .artist {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 3px;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 10px;
  }

  .time {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }

  .fill {
    height: 100%;
    width: 0%;
    background: #1DB954;
    border-radius: 10px;
    transition: width 1s linear;
    position: relative;
  }

  .fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px rgba(29,185,84,0.8);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .widget.playing .fill::after { opacity: 1; }

  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #login-screen button {
    font-family: 'DM Mono', monospace;
    background: #1DB954;
    color: #000;
    border: none;
    padding: 14px 32px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, background 0.15s;
  }

  #login-screen button:hover {
    background: #1ed760;
    transform: scale(1.04);
  }
</style>
</head>
<body>

<div id="login-screen" style="display:none">
  <button onclick="login()">CONECTAR SPOTIFY</button>
</div>

<div class="widget" id="widget">
  <div class="inner">
    <div class="art-wrap">
      <img id="art" src="" alt="">
    </div>
    <div class="info">
      <div class="label"><span class="dot"></span><span id="status">SONANDO</span></div>
      <div class="title" id="title">—</div>
      <div class="artist" id="artist">—</div>
      <div class="progress-row">
        <span class="time" id="elapsed">0:00</span>
        <div class="bar"><div class="fill" id="fill"></div></div>
        <span class="time" id="duration">0:00</span>
      </div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID    = 'e19133bd7acf486d8d4adc5254f18509';
const REDIRECT_URI = 'http://127.0.0.1:8888';
const SCOPES       = 'user-read-currently-playing user-read-playback-state';

// ── PKCE ────────────────────────────────────────────────
function randomString(len) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let s = '';
  for (let i = 0; i < len; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

async function sha256(plain) {
  const enc = new TextEncoder().encode(plain);
  return crypto.subtle.digest('SHA-256', enc);
}

function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generatePKCE() {
  const verifier  = randomString(64);
  const challenge = base64url(await sha256(verifier));
  return { verifier, challenge };
}

// ── Auth ─────────────────────────────────────────────────
async function login() {
  const { verifier, challenge } = await generatePKCE();
  localStorage.setItem('pkce_verifier', verifier);
  const url = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({
    client_id:             CLIENT_ID,
    response_type:         'code',
    redirect_uri:          REDIRECT_URI,
    scope:                 SCOPES,
    code_challenge_method: 'S256',
    code_challenge:        challenge,
  });
  window.location.href = url;
}

async function exchangeCode(code) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type:    'authorization_code',
      code,
      redirect_uri:  REDIRECT_URI,
      client_id:     CLIENT_ID,
      code_verifier: localStorage.getItem('pkce_verifier'),
    }),
  });
  return r.json();
}

async function doRefresh() {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type:    'refresh_token',
      refresh_token: localStorage.getItem('sp_refresh'),
      client_id:     CLIENT_ID,
    }),
  });
  const d = await r.json();
  if (d.access_token) {
    localStorage.setItem('sp_access', d.access_token);
    localStorage.setItem('sp_exp', Date.now() + d.expires_in * 1000);
    if (d.refresh_token) localStorage.setItem('sp_refresh', d.refresh_token);
  }
}

function isExpired() {
  return Date.now() > (parseInt(localStorage.getItem('sp_exp')) || 0) - 60000;
}

// ── UI ───────────────────────────────────────────────────
const widget    = document.getElementById('widget');
const titleEl   = document.getElementById('title');
const artistEl  = document.getElementById('artist');
const artEl     = document.getElementById('art');
const fillEl    = document.getElementById('fill');
const elapsedEl = document.getElementById('elapsed');
const durEl     = document.getElementById('duration');
const statusEl  = document.getElementById('status');

function fmt(ms) {
  const s = Math.floor(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

let lastId = null;

async function fetchNow() {
  if (isExpired()) await doRefresh();
  let r;
  try {
    r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
      headers: { Authorization: 'Bearer ' + localStorage.getItem('sp_access') }
    });
  } catch(e) { return; }

  if (r.status === 204 || r.status === 401) {
    widget.classList.remove('visible', 'playing');
    return;
  }

  const data = await r.json();
  if (!data || !data.item) { widget.classList.remove('visible', 'playing'); return; }

  const track    = data.item;
  const playing  = data.is_playing;
  const progress = data.progress_ms;
  const total    = track.duration_ms;

  titleEl.textContent   = track.name;
  artistEl.textContent  = track.artists.map(a => a.name).join(', ');
  elapsedEl.textContent = fmt(progress);
  durEl.textContent     = fmt(total);
  fillEl.style.width    = ((progress / total) * 100).toFixed(1) + '%';
  statusEl.textContent  = playing ? 'SONANDO' : 'PAUSADO';

  widget.classList.add('visible');
  widget.classList.toggle('playing', playing);

  if (track.id !== lastId) {
    lastId = track.id;
    const img = track.album.images[1] || track.album.images[0];
    if (img) artEl.src = img.url;
  }
}

// ── Init ─────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');

  if (code) {
    history.replaceState({}, '', window.location.pathname);
    const tokens = await exchangeCode(code);
    if (tokens.access_token) {
      localStorage.setItem('sp_access',  tokens.access_token);
      localStorage.setItem('sp_refresh', tokens.refresh_token);
      localStorage.setItem('sp_exp',     Date.now() + tokens.expires_in * 1000);
    }
  }

  if (!localStorage.getItem('sp_access')) {
    document.getElementById('login-screen').style.display = 'flex';
    return;
  }

  fetchNow();
  setInterval(fetchNow, 3000);
}

init();
</script>
</body>
</html>
