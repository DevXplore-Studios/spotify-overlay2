<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 24px;
  }

  /* ─── WIDGET ─── */
  .widget {
    position: relative;
    opacity: 0;
    transform: translateY(-16px) scale(0.96);
    transition: opacity 0.5s cubic-bezier(.22,1,.36,1), transform 0.5s cubic-bezier(.22,1,.36,1);
  }

  .widget.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* ─── CARD ─── */
  .inner {
    position: relative;
    background: rgba(12, 12, 14, 1);
    border: 1.5px solid rgba(255,255,255,0.10);
    border-top-color: rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 10px 14px 10px 12px;
    display: flex;
    gap: 12px;
    align-items: center;
    min-width: 220px;
    box-shadow:
      0 2px 0 rgba(255,255,255,0.05) inset,
      0 16px 48px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  /* Patrón diagonal estilo carta */
  .inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.012) 0px,
      rgba(255,255,255,0.012) 1px,
      transparent 1px,
      transparent 10px
    );
    pointer-events: none;
  }

  /* Línea superior */
  .inner::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14) 50%, transparent);
  }

  /* Esquinas estilo carta */
  .corner {
    position: absolute;
    font-size: 9px;
    font-weight: 800;
    color: rgba(255,255,255,0.15);
    line-height: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    z-index: 2;
  }
  .corner .suit { font-size: 7px; }
  .corner.tl { top: 5px; left: 7px; }
  .corner.br { bottom: 5px; right: 7px; transform: rotate(180deg); }

  /* ─── ICONO PALO ─── */
  .suit-icon {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }

  /* ─── INFO ─── */
  .info {
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }

  .label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 3px;
  }

  .follower-name {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
    letter-spacing: -0.2px;
  }

  /* Animación del nombre cuando cambia */
  .follower-name.flash {
    animation: nameFlash 0.6s ease forwards;
  }

  @keyframes nameFlash {
    0%   { opacity: 0; transform: translateX(8px); }
    100% { opacity: 1; transform: translateX(0); }
  }

  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="widget visible" id="widget">
  <div class="inner">
    <div class="corner tl"><span>♠</span></div>
    <div class="corner br"><span>♠</span></div>
    <div class="suit-icon">♠</div>
    <div class="info">
      <div class="label">Último seguidor</div>
      <div class="follower-name" id="name">Esperando...</div>
    </div>
  </div>
</div>

<script>
const widget   = document.getElementById('widget');
const nameEl   = document.getElementById('name');

const SUITS = ['♠', '♥', '♦', '♣'];
let suitIndex = 0;

function setFollower(name) {
  nameEl.classList.remove('flash');
  void nameEl.offsetWidth;
  nameEl.textContent = name;
  nameEl.classList.add('flash');

  // Cambia el palo al llegar un nuevo seguidor
  suitIndex = (suitIndex + 1) % SUITS.length;
  document.querySelector('.suit-icon').textContent = SUITS[suitIndex];
  document.querySelectorAll('.corner span').forEach(el => el.textContent = SUITS[suitIndex]);

  widget.classList.add('visible');
}

// ─── STREAMLABS EVENTS ───────────────────────────────────
document.addEventListener('onEventReceived', function(obj) {
  if (!obj || !obj.detail) return;
  var detail  = obj.detail;
  var type    = (detail.type || '').toLowerCase();
  var payload = detail.payload || {};
  var name    = detail.name || payload.name || detail.from || payload.from || 'Anónimo';

  if (type === 'follow') setFollower(name);
  if (type === 'subscription' || type === 'resub') setFollower(name);
});

document.addEventListener('onLoad', function(obj) {
  try {
    var d = obj && obj.detail ? obj.detail : {};
    if (d.lastFollower) setFollower(d.lastFollower);
    else widget.classList.add('visible');
  } catch(e) {
    widget.classList.add('visible');
  }
});

window.addEventListener('load', function() {
  widget.classList.add('visible');
  // Intentar obtener último seguidor via API pública de Twitch
  fetch('https://decapi.me/twitch/followers/aleqx_x?count=1')
    .then(function(r) { return r.text(); })
    .then(function(name) {
      if (name && name.trim() && !name.includes('error')) {
        nameEl.textContent = name.trim();
      }
    })
    .catch(function() {});
});

// Test
window.testFollow = function(name) { setFollower(name || 'TestUser'); };
</script>
</body>
</html>
