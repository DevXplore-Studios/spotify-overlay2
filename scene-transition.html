<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: 'Outfit', sans-serif;
  }

  #stage {
    width: 100%; height: 100%;
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  /* ─── OVERLAY NEGRO ─── */
  #curtain {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    z-index: 998;
    transition: none;
  }

  /* ─── CARTA ─── */
  .card {
    position: absolute;
    border-radius: 10px;
    background: #0d0d10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    opacity: 0;
    will-change: transform, opacity;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.018) 0px,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 8px
    );
  }

  .card-inner {
    position: relative;
    z-index: 1;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card-suit {
    line-height: 1;
    filter: drop-shadow(0 0 14px currentColor);
  }

  .card-rank {
    position: absolute;
    font-weight: 800;
    line-height: 1;
    z-index: 1;
  }
  .card-rank.tl { top: 8%; left: 10%; }
  .card-rank.br { bottom: 8%; right: 10%; transform: rotate(180deg); }

  /* Borde interior */
  .card-border {
    position: absolute;
    inset: 6%;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.05);
    pointer-events: none;
  }

  /* ─── BARRIDO LATERAL ─── */
  #sweep {
    position: fixed;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    z-index: 997;
    pointer-events: none;
    background: linear-gradient(
      105deg,
      transparent 0%,
      rgba(255,255,255,0.03) 45%,
      rgba(255,255,255,0.07) 50%,
      rgba(255,255,255,0.03) 55%,
      transparent 100%
    );
  }

  /* ─── LÍNEAS DE VELOCIDAD ─── */
  .speed-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform-origin: left center;
    opacity: 0;
  }

</style>
</head>
<body>

<div id="curtain"></div>
<div id="sweep"></div>
<div id="stage"></div>

<script>
const stage   = document.getElementById('stage');
const curtain = document.getElementById('curtain');
const sweep   = document.getElementById('sweep');

const SUITS_DATA = [
  { sym: '♠', color: '#ffffff', rank: 'A',  glow: 'rgba(255,255,255,0.4)' },
  { sym: '♥', color: '#e05555', rank: 'K',  glow: 'rgba(224,85,85,0.5)' },
  { sym: '♦', color: '#e05555', rank: 'Q',  glow: 'rgba(224,85,85,0.5)' },
  { sym: '♣', color: '#ffffff', rank: 'J',  glow: 'rgba(255,255,255,0.4)' },
  { sym: '♠', color: '#4fc3f7', rank: '10', glow: 'rgba(79,195,247,0.5)' },
  { sym: '♥', color: '#ffd54f', rank: '9',  glow: 'rgba(255,213,79,0.5)' },
  { sym: '♦', color: '#69f0ae', rank: '8',  glow: 'rgba(105,240,174,0.5)' },
  { sym: '♣', color: '#ce93d8', rank: '7',  glow: 'rgba(206,147,216,0.5)' },
  { sym: '♠', color: '#ff5252', rank: '6',  glow: 'rgba(255,82,82,0.5)' },
  { sym: '♥', color: '#ffffff', rank: '5',  glow: 'rgba(255,255,255,0.4)' },
];

function rnd(a, b) { return a + Math.random() * (b - a); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function createCard(suit, size, x, y, rotStart, rotEnd, delay, duration, fallDist, fromSide) {
  const card = document.createElement('div');
  card.className = 'card';

  card.style.cssText =
    'width:' + size + 'px;' +
    'height:' + (size * 1.4) + 'px;' +
    'left:' + x + 'px;' +
    'top:' + y + 'px;' +
    'border: 1.5px solid rgba(255,255,255,0.09);' +
    'border-top-color: rgba(255,255,255,0.17);' +
    'box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 20px ' + suit.glow + ', 0 2px 0 rgba(255,255,255,0.05) inset;';

  const rankSize  = Math.round(size * 0.14);
  const suitSize  = Math.round(size * 0.42);

  card.innerHTML =
    '<div class="card-inner">' +
      '<span class="card-rank tl" style="color:' + suit.color + ';font-size:' + rankSize + 'px">' + suit.rank + '</span>' +
      '<span class="card-suit" style="color:' + suit.color + ';font-size:' + suitSize + 'px">' + suit.sym + '</span>' +
      '<span class="card-rank br" style="color:' + suit.color + ';font-size:' + rankSize + 'px">' + suit.rank + '</span>' +
    '</div>' +
    '<div class="card-border"></div>';

  stage.appendChild(card);

  // Animación con requestAnimationFrame
  const startTime = performance.now() + delay;
  let started = false;

  function animate(now) {
    if (now < startTime) { requestAnimationFrame(animate); return; }

    if (!started) {
      card.style.opacity = '1';
      started = true;
    }

    const elapsed = (now - startTime) / 1000;
    const t = Math.min(elapsed / duration, 1);

    // Easing
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;

    // Posición Y con rebote
    const fallProgress = ease;
    const bounceT = Math.max(0, (t - 0.7) / 0.3);
    const bounce  = Math.sin(bounceT * Math.PI) * 12 * (1 - bounceT);
    const currentY = fallDist * fallProgress + bounce;

    // Rotación
    const rot = rotStart + (rotEnd - rotStart) * ease;

    // Fade out al final
    const opacity = t < 0.75 ? 1 : 1 - ((t - 0.75) / 0.25);

    // Wobble lateral suave
    const wobble = Math.sin(elapsed * 6) * 3 * (1 - t);

    card.style.transform = 'translate(' + wobble + 'px,' + currentY + 'px) rotate(' + rot + 'deg)';
    card.style.opacity   = String(Math.max(0, opacity));

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      card.remove();
    }
  }

  requestAnimationFrame(animate);
}

function spawnSpeedLines(count, duration) {
  for (let i = 0; i < count; i++) {
    const line  = document.createElement('div');
    line.className = 'speed-line';
    const y     = rnd(5, 95);
    const w     = rnd(15, 45);
    const delay = rnd(0, duration * 0.4) * 1000;
    line.style.cssText =
      'top:' + y + '%;' +
      'left:' + rnd(-10, 60) + '%;' +
      'width:' + w + '%;';
    stage.appendChild(line);

    setTimeout(function() {
      line.style.transition = 'opacity ' + (duration * 0.3) + 's ease';
      line.style.opacity    = '1';
      setTimeout(function() {
        line.style.opacity = '0';
        setTimeout(function() { line.remove(); }, duration * 300);
      }, duration * 400);
    }, delay);
  }
}

function runTransition() {
  stage.innerHTML = '';

  const DURATION   = 2.0;
  const W          = window.innerWidth;
  const H          = window.innerHeight;
  const CARD_COUNT = 22;

  // Cortina negra
  curtain.style.transition = 'none';
  curtain.style.opacity    = '0';
  setTimeout(function() {
    curtain.style.transition = 'opacity ' + (DURATION * 0.25) + 's ease';
    curtain.style.opacity    = '0.7';
    setTimeout(function() {
      curtain.style.transition = 'opacity ' + (DURATION * 0.4) + 's ease';
      curtain.style.opacity    = '0';
    }, DURATION * 500);
  }, 10);

  // Barrido lateral
  sweep.style.transition = 'none';
  sweep.style.left       = '-100%';
  setTimeout(function() {
    sweep.style.transition = 'left ' + DURATION + 's cubic-bezier(.22,1,.36,1)';
    sweep.style.left       = '200%';
  }, 50);

  // Líneas de velocidad
  spawnSpeedLines(18, DURATION);

  // Cartas — distribuidas en columnas con variación
  for (let i = 0; i < CARD_COUNT; i++) {
    const suit     = SUITS_DATA[i % SUITS_DATA.length];
    const size     = Math.round(rnd(55, 110));
    const col      = (i / CARD_COUNT);
    const x        = col * W + rnd(-30, 30);
    const y        = rnd(-size * 1.4 - 60, -size * 0.6);
    const rotStart = rnd(-35, 35);
    const rotEnd   = rnd(-20, 20);
    const delay    = rnd(0, DURATION * 0.45) * 1000;
    const dur      = rnd(DURATION * 0.6, DURATION * 0.85);
    const fallDist = rnd(H * 0.35, H * 0.75);

    createCard(suit, size, x, y, rotStart, rotEnd, delay, dur, fallDist, false);
  }

  // Limpiar
  setTimeout(function() {
    stage.innerHTML = '';
    sweep.style.transition = 'none';
    sweep.style.left = '-100%';
  }, (DURATION + 0.8) * 1000);
}

// ─── STREAMLABS ──────────────────────────────────────────
document.addEventListener('onEventReceived', function(obj) {
  if (!obj || !obj.detail) return;
  var type = (obj.detail.type || '').toLowerCase();
  if (type === 'scene-switch' || type === 'sceneswitch' || type === 'scene_switch') {
    runTransition();
  }
});

document.addEventListener('onLoad', function() {});

window.runTransition = runTransition;

// Se dispara al cargar, luego recarga la página para el próximo cambio de escena
window.addEventListener('load', function() {
  setTimeout(function() {
    runTransition();
    // Recarga la página tras la animación para estar listo para el siguiente cambio
    setTimeout(function() {
      window.location.reload();
    }, 3000);
  }, 200);
});
</script>
</body>
</html>
